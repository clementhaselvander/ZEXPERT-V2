<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z'Expert - Avis Clients</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reviews-wall.css">
</head>
<body>
  <section class="zx-reviews-wall" aria-labelledby="zx-reviews-title">
    <div class="zx-reviews-bg" aria-hidden="true"></div>

    <div class="zx-reviews-shell">
      <header class="zx-reviews-header">
        <span class="zx-reviews-kicker">Avis clients verifies</span>
        <h2 id="zx-reviews-title">Ils ont finance leur projet avec Z'Expert</h2>
        <p>
          Une experience de courtage immobilier premium, portee par la rigueur,
          la discretion et l'exigence du resultat.
        </p>
      </header>

      <div class="zx-reviews-viewport" data-reviews-wall>
        <div class="zx-reviews-fade zx-reviews-fade-top" aria-hidden="true"></div>
        <div class="zx-reviews-fade zx-reviews-fade-bottom" aria-hidden="true"></div>

        <div class="zx-reviews-grid">
          <div class="zx-reviews-column" style="--duration: 56s;">
            <div class="zx-reviews-track">
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-1.png" alt="Avis client Z'Expert de Katerina" loading="lazy">
              </article>
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-4.png" alt="Avis client Z'Expert de Anaia" loading="lazy">
              </article>
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-8.png" alt="Avis client Z'Expert de Bertrand" loading="lazy">
              </article>
            </div>
          </div>

          <div class="zx-reviews-column" style="--duration: 64s;">
            <div class="zx-reviews-track">
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-2.png" alt="Avis client Z'Expert de Stacy" loading="lazy">
              </article>
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-5.png" alt="Avis client Z'Expert de Alexia" loading="lazy">
              </article>
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-9.png" alt="Avis client Z'Expert de Axel" loading="lazy">
              </article>
            </div>
          </div>

          <div class="zx-reviews-column" style="--duration: 60s;">
            <div class="zx-reviews-track">
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-3.png" alt="Avis client Z'Expert de Yves" loading="lazy">
              </article>
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-7.png" alt="Avis client Z'Expert de Anne-Sophie" loading="lazy">
              </article>
              <article class="zx-review-card">
                <img src="/assets/images/avis/avis-1.png" alt="Avis client Z'Expert de Katerina" loading="lazy">
              </article>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="reviews-wall.js"></script>
</body>
</html>
